---
- name: Check that expected containers are up
  ansible.builtin.command: >
    sudo -u {{ health_check_podman_user | default('root') }}
    podman ps --filter name={{ item }} --format "{{ '{{' }}.Status{{ '}}' }}"
  args:
    chdir: /tmp
  register: container_status
  changed_when: false
  loop: "{{ health_check_containers | default([]) }}"
  loop_control:
    label: "{{ item }}"
  delegate_to: "{{ health_check_delegate_to | default(inventory_hostname) }}"
  when: health_check_containers is defined

- name: Initialize container health results
  ansible.builtin.set_fact:
    health_check_container_results: []
  when: health_check_containers is defined

- name: Record each container's health status
  ansible.builtin.set_fact:
    health_check_container_results: "{{ health_check_container_results + [{'name': item.item, 'status': ('Up' if 'Up' in item.stdout else 'DOWN')}] }}"
  loop: "{{ container_status.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  when: health_check_containers is defined

- name: Check that the URL responds correctly
  ansible.builtin.uri:
    url: "{{ health_check_url }}"
    status_code: 200
    timeout: 10
  when: health_check_url is defined
  register: url_check
  retries: 5
  delay: 10
  until: (url_check.status | default(0)) == 200
  ignore_errors: true
  delegate_to: "{{ health_check_delegate_to | default(inventory_hostname) }}"

- name: Record URL check status
  ansible.builtin.set_fact:
    health_check_url_status: "{{ 'OK' if (url_check.status | default(0)) == 200 else 'FAILED' }}"
  when: health_check_url is defined

- name: Fail if any container is down (only when explicitly requested)
  ansible.builtin.fail:
    msg: "Container {{ item.name }} is not up."
  loop: "{{ health_check_container_results | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - health_check_fail_on_unhealthy | default(false) | bool
    - item.status == 'DOWN'

- name: Fail if URL check failed (only when explicitly requested)
  ansible.builtin.fail:
    msg: "URL check failed for {{ health_check_url }}."
  when:
    - health_check_fail_on_unhealthy | default(false) | bool
    - health_check_url is defined
    - health_check_url_status == 'FAILED'
