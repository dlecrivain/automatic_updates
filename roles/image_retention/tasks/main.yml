---
- name: Copy the image retention script
  ansible.builtin.copy:
    src: prune_images.py
    dest: /tmp/prune_images.py
    mode: '0755'

- name: Run image retention (keep last 2 per repository)
  ansible.builtin.command: python3 /tmp/prune_images.py
  register: retention_result
  changed_when: "'removed:0' not in retention_result.stdout"

- name: Clean up the retention script
  ansible.builtin.file:
    path: /tmp/prune_images.py
    state: absent
