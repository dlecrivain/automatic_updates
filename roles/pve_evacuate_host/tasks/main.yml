---
- name: Compute placement for VMs on this host
  include_role:
    name: pve_placement

- name: Migrate each VM in sequence, verifying health immediately after each one
  ansible.builtin.include_tasks: migrate_and_verify.yml
  loop: "{{ vm_placements }}"
  loop_control:
    loop_var: vm
    label: "{{ vm.name }} -> {{ vm.target_node }}"
