---
- name: "Migrate {{ vm.name }} to {{ vm.target_node }}"
  include_role:
    name: pve_migrate_vm
  vars:
    migrate_vmid: "{{ vm.vmid }}"
    migrate_target_node: "{{ vm.target_node }}"

- name: "Check {{ vm.name }} health immediately after migration"
  include_role:
    name: health_check
  vars:
    health_check_delegate_to: "{{ vm.name }}"
    health_check_fail_on_unhealthy: true
    health_check_containers: "{{ hostvars[vm.name].health_check_containers | default(omit) }}"
    health_check_url: "{{ hostvars[vm.name].health_check_url | default(omit) }}"
    health_check_podman_user: "{{ hostvars[vm.name].health_check_podman_user | default(omit) }}"
