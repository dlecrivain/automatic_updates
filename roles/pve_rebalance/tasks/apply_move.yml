---
- name: "Migrate {{ move.name }} to {{ move.target_node }}"
  include_role:
    name: pve_migrate_vm
  vars:
    migrate_vmid: "{{ move.vmid }}"
    migrate_target_node: "{{ move.target_node }}"
    migrate_delegate_to: "{{ move.current_node }}"

- name: "Check {{ move.name }} health after rebalance move"
  include_role:
    name: health_check
  vars:
    health_check_delegate_to: "{{ move.name }}"
    health_check_fail_on_unhealthy: true
    health_check_containers: "{{ hostvars[move.name].health_check_containers | default([]) }}"
    health_check_url: "{{ hostvars[move.name].health_check_url | default('') }}"
    health_check_podman_user: "{{ hostvars[move.name].health_check_podman_user | default('root') }}"
