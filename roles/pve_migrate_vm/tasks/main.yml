---
- name: Check for residual snapshots that would block migration
  ansible.builtin.command: >
    qm listsnapshot {{ migrate_vmid }}
  register: existing_snapshots
  changed_when: false

- name: Remove residual ansible_container snapshot if present
  ansible.builtin.command: >
    qm delsnapshot {{ migrate_vmid }} ansible_container
  when: "'ansible_container' in existing_snapshots.stdout"

- name: Remove residual ansible_patching snapshot if present
  ansible.builtin.command: >
    qm delsnapshot {{ migrate_vmid }} ansible_patching
  when: "'ansible_patching' in existing_snapshots.stdout"

- name: Confirm no blocking snapshot remains before migrating
  ansible.builtin.command: >
    qm listsnapshot {{ migrate_vmid }}
  register: snapshot_recheck
  changed_when: false
  retries: 6
  delay: 5
  until: "'ansible_container' not in snapshot_recheck.stdout and 'ansible_patching' not in snapshot_recheck.stdout"

- name: Start the live migration
  ansible.builtin.command: >
    qm migrate {{ migrate_vmid }} {{ migrate_target_node }}
    --online --with-local-disks --targetstorage nvme_data
  register: migrate_start
  async: 21600
  poll: 0

- name: Wait for the migration to complete
  ansible.builtin.async_status:
    jid: "{{ migrate_start.ansible_job_id }}"
  register: migrate_job
  until: migrate_job.finished
  retries: 720
  delay: 30
  ignore_errors: true

- name: Fail clearly if the migration job itself reports an error
  ansible.builtin.fail:
    msg: "Migration of VM {{ migrate_vmid }} to {{ migrate_target_node }} failed: {{ migrate_job.stderr | default('unknown error') }}"
  when: migrate_job.rc is defined and migrate_job.rc != 0

- name: Confirm the VM is now running on the target node
  ansible.builtin.command: >
    pvesh get /nodes/{{ migrate_target_node }}/qemu/{{ migrate_vmid }}/status/current
    --output-format json
  register: vm_status_check
  retries: 6
  delay: 5
  until: (vm_status_check.stdout | from_json).status == 'running'
  changed_when: false
