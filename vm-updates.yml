---
- name: Steps 1 and 2 - Promote CV_Rocky_10
  hosts: "{{ lpkat_host | default('lpkat101') }}"
  gather_facts: false
  vars:
    content_view_name: CV_Rocky_10
  roles:
    - katello_promote

- name: Steps 3 to 7 - Check and update all VMs except lpkat101 and semaphore101
  hosts: "{{ target_hosts | default('proxmox_all_qemu:!lpkat101:!semaphore101') }}"
  gather_facts: true
  serial: 1
  tasks:
    - name: Capture the full list of targeted hosts (once)
      include_role:
        name: capture_host_list

    - name: Step 3 - Check for available updates
      include_role:
        name: check_updates

    - name: Steps 4 to 6 (only if updates are available)
      when: has_updates | default(false) | bool
      block:
        - name: Step 4 - Proxmox snapshot
          vars:
            snapshot_label: ansible_patching
          include_role:
            name: proxmox_snapshot

        - name: Step 5 - Apply updates
          include_role:
            name: apply_updates
          when: not (snapshot_already_exists | default(false))

        - name: Step 6 - Reboot and wait
          include_role:
            name: reboot_and_wait
          when: not (snapshot_already_exists | default(false))

    - name: Step 7 - Check services
      include_role:
        name: health_check

    - name: Determine overall host status
      include_role:
        name: host_status

    - name: Record whether an update was applied or skipped for this host
      ansible.builtin.set_fact:
        host_update_applied: "{{ (has_updates | default(false) | bool) and not (snapshot_already_exists | default(false)) }}"
        host_update_skipped: "{{ (has_updates | default(false) | bool) and (snapshot_already_exists | default(false)) }}"

- name: Send aggregated vm-updates report
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Build and send the HTML report email
      include_role:
        name: send_report
      vars:
        report_subject: "[vm-updates] Weekly patch report"
        report_body: |
          <html>
          <body style="font-family: Arial, sans-serif; color: #222;">
            <h2 style="color:#2c3e50;">VM updates report</h2>
            <table style="border-collapse: collapse; width: 100%;">
              <tr style="background-color:#2c3e50; color:white;">
                <th style="padding:8px; border:1px solid #ccc; text-align:left;">Host</th>
                <th style="padding:8px; border:1px solid #ccc; text-align:left;">Update Status</th>
                <th style="padding:8px; border:1px solid #ccc; text-align:left;">URL Status</th>
              </tr>
              {% for h in hostvars['localhost'].target_host_list %}
              {% if hostvars[h].host_overall_status is defined %}
              {% if hostvars[h].host_overall_status == 'PROBLEM' %}
              {% set row_color = '#fdecea' %}
              {% elif hostvars[h].host_update_skipped | default(false) %}
              {% set row_color = '#fff4e5' %}
              {% elif hostvars[h].host_update_applied | default(false) %}
              {% set row_color = '#eaf2fd' %}
              {% else %}
              {% set row_color = '#eafaf1' %}
              {% endif %}
              <tr style="background-color:{{ row_color }};">
                <td style="padding:8px; border:1px solid #ccc;">{{ h }}</td>
                <td style="padding:8px; border:1px solid #ccc;">
                  {% if hostvars[h].host_update_skipped | default(false) %}
                  Skipped — an "ansible_patching" snapshot already existed
                  {% elif hostvars[h].host_update_applied | default(false) %}
                  Updated and rebooted
                  {% else %}
                  No update needed
                  {% endif %}
                </td>
                <td style="padding:8px; border:1px solid #ccc;">{{ hostvars[h].health_check_url_status | default('N/A') }}</td>
              </tr>
              {% endif %}
              {% endfor %}
            </table>
          </body>
          </html>
