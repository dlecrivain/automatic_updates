---
- name: Remove ansible_patching snapshots across all patched VMs
  hosts: "{{ target_hosts | default('proxmox_all_qemu:!lpkat101:!semaphore101') }}"
  gather_facts: false
  tasks:
    - name: Check existing snapshots for this VM
      ansible.builtin.command: >
        pvesh get /nodes/{{ proxmox_node }}/qemu/{{ proxmox_vmid }}/snapshot
      delegate_to: "{{ proxmox_api_host }}"
      remote_user: "{{ proxmox_ssh_user }}"
      vars:
        ansible_python_interpreter: "{{ proxmox_python_interpreter }}"
      register: snapshot_list
      changed_when: false

    - name: Remove the ansible_patching snapshot if it exists
      ansible.builtin.command: >
        pvesh delete /nodes/{{ proxmox_node }}/qemu/{{ proxmox_vmid }}/snapshot/ansible_patching
      delegate_to: "{{ proxmox_api_host }}"
      remote_user: "{{ proxmox_ssh_user }}"
      vars:
        ansible_python_interpreter: "{{ proxmox_python_interpreter }}"
      when: "'ansible_patching' in snapshot_list.stdout"
