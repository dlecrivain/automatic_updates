---
- name: Update Podman containers on Quadlet-managed hosts
  hosts: "{{ target_hosts | default('proxmox_all_qemu:!lpkat101:!semaphore101') }}"
  gather_facts: false
  serial: 1
  tasks:
    - name: Capture the full list of targeted hosts (once)
      ansible.builtin.set_fact:
        target_host_list: "{{ ansible_play_hosts_all }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true

    - name: Snapshot before applying container updates
      vars:
        snapshot_label: ansible_container
      include_role:
        name: proxmox_snapshot
      when: podman_units is defined

    - name: Update Podman containers
      include_role:
        name: podman_update
      when: podman_units is defined and not (snapshot_already_exists | default(false))

    - name: Check services after update
      include_role:
        name: health_check
      when: podman_units is defined

    - name: Record whether the update was skipped due to an existing snapshot
      ansible.builtin.set_fact:
        host_update_skipped: "{{ (podman_units is defined) and (snapshot_already_exists | default(false)) }}"
      when: podman_units is defined

    - name: Determine overall host status
      ansible.builtin.set_fact:
        host_overall_status: >-
          {{ 'PROBLEM' if (
               (health_check_container_results | default([]) | selectattr('status', 'equalto', 'DOWN') | list | length > 0)
               or (health_check_url_status | default('OK') == 'FAILED')
             ) else 'OK' }}
      when: podman_units is defined

    - name: Prune old container images
      include_role:
        name: image_retention
      when: podman_units is defined

- name: Send aggregated container-updates report
  hosts: localhost
  gather_facts: false
  vars:
    smtp_user: "{{ lookup('env', 'SMTP_USER') }}"
    smtp_password: "{{ lookup('env', 'SMTP_PASSWORD') }}"
    notify_email_to: "{{ lookup('env', 'NOTIFY_EMAIL_TO') }}"
  tasks:
    - name: Determine if any host has a problem
      ansible.builtin.set_fact:
        any_problem: "{{ hostvars['localhost'].target_host_list | map('extract', hostvars) | map(attribute='host_overall_status', default='OK') | select('equalto', 'PROBLEM') | list | length > 0 }}"

    - name: Build and send the HTML report email
      community.general.mail:
        host: "{{ smtp_host }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user }}"
        password: "{{ smtp_password }}"
        to: "{{ notify_email_to }}"
        from: "{{ smtp_user }}"
        secure: starttls
        subtype: html
        subject: "[container-updates] {{ 'PROBLEM detected' if any_problem else 'All OK' }}"
        body: |
          <html>
          <body style="font-family: Arial, sans-serif; color: #222;">
            <h2 style="color:#2c3e50;">Container updates report</h2>
            <table style="border-collapse: collapse; width: 100%;">
              <tr style="background-color:#2c3e50; color:white;">
                <th style="padding:8px; border:1px solid #ccc; text-align:left;">Host</th>
                <th style="padding:8px; border:1px solid #ccc; text-align:left;">Container</th>
                <th style="padding:8px; border:1px solid #ccc; text-align:left;">Status</th>
                <th style="padding:8px; border:1px solid #ccc; text-align:left;">URL Status</th>
              </tr>
              {% for h in hostvars['localhost'].target_host_list %}
              {% if hostvars[h].host_update_skipped | default(false) %}
              <tr style="background-color:#fff4e5;">
                <td style="padding:8px; border:1px solid #ccc;">{{ h }}</td>
                <td style="padding:8px; border:1px solid #ccc;" colspan="3">Skipped — an "ansible_container" snapshot already existed</td>
              </tr>
              {% endif %}
              {% if hostvars[h].podman_update_summary is defined and not (hostvars[h].host_update_skipped | default(false)) %}
              {% for c in hostvars[h].podman_update_summary %}
              {% set running = hostvars[h].health_check_container_results | default([]) | selectattr('name','equalto',c.name) | map(attribute='status') | first | default('Up') %}
              {% if running != 'Up' %}
              {% set row_color = '#fdecea' %}
              {% elif c.updated %}
              {% set row_color = '#eaf2fd' %}
              {% else %}
              {% set row_color = '#eafaf1' %}
              {% endif %}
              <tr style="background-color:{{ row_color }};">
                <td style="padding:8px; border:1px solid #ccc;">{{ h }}</td>
                <td style="padding:8px; border:1px solid #ccc;">{{ c.name }}</td>
                <td style="padding:8px; border:1px solid #ccc;">
                  {{ running }}
                  {% if c.updated %} — updated {{ c.old_version }} → {{ c.new_version }}{% else %} — unchanged ({{ c.old_version }}){% endif %}
                </td>
                <td style="padding:8px; border:1px solid #ccc;">
                  {{ hostvars[h].health_check_url_status | default('N/A') }}
                </td>
              </tr>
              {% endfor %}
              {% endif %}
              {% endfor %}
            </table>
          </body>
          </html>
