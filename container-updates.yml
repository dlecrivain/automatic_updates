---
- name: Update Podman containers on Quadlet-managed hosts
  hosts: "{{ target_hosts | default('proxmox_all_qemu:!lpkat101:!semaphore101') }}"
  gather_facts: false
  serial: 1
  vars:
    smtp_user: "{{ lookup('env', 'SMTP_USER') }}"
    smtp_password: "{{ lookup('env', 'SMTP_PASSWORD') }}"
    notify_email_to: "{{ lookup('env', 'NOTIFY_EMAIL_TO') }}"
  tasks:
    - name: Snapshot before applying container updates
      vars:
        snapshot_label: ansible_container
      include_role:
        name: proxmox_snapshot
      when: podman_units is defined

    - name: Update Podman containers
      include_role:
        name: podman_update
      when: podman_units is defined

    - name: Check services and notify by email
      when: podman_units is defined
      block:
        - name: Check services after update
          include_role:
            name: health_check

        - name: Send report email (update successful)
          community.general.mail:
            host: "{{ smtp_host }}"
            port: "{{ smtp_port }}"
            username: "{{ smtp_user }}"
            password: "{{ smtp_password }}"
            to: "{{ notify_email_to }}"
            from: "{{ smtp_user }}"
            secure: starttls
            subject: "[container-updates] {{ inventory_hostname }} - OK"
            body: |
              Container update check completed on {{ inventory_hostname }}.

              Container status:
              {% for item in podman_update_summary %}
              - {{ item.name }}: {% if item.updated %}updated ({{ item.old_version }} -> {{ item.new_version }}){% else %}already up to date ({{ item.old_version }}){% endif %}
              {% endfor %}

              All services are healthy.
          delegate_to: localhost

      rescue:
        - name: Send report email (problem detected)
          community.general.mail:
            host: "{{ smtp_host }}"
            port: "{{ smtp_port }}"
            username: "{{ smtp_user }}"
            password: "{{ smtp_password }}"
            to: "{{ notify_email_to }}"
            from: "{{ smtp_user }}"
            secure: starttls
            subject: "[container-updates] {{ inventory_hostname }} - PROBLEM"
            body: |
              Container update check completed on {{ inventory_hostname }}, but one or more services did not come back up correctly.

              Container status:
              {% for item in podman_update_summary %}
              - {{ item.name }}: {% if item.updated %}updated ({{ item.old_version }} -> {{ item.new_version }}){% else %}already up to date ({{ item.old_version }}){% endif %}
              {% endfor %}

              Failed containers:
              {% for c in container_status.results | default([]) %}{% if 'Up' not in c.stdout %}
              - {{ c.item }}
              {% endif %}{% endfor %}

              The pre-update snapshot "ansible_container" has been kept for manual rollback.
          delegate_to: localhost

        - name: Fail the play after sending the alert
          ansible.builtin.fail:
            msg: "Health check failed on {{ inventory_hostname }} after container update, alert email sent."

    - name: Prune old container images
      include_role:
        name: image_retention
      when: podman_units is defined
