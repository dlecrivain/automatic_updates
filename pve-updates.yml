---
- name: PVE host updates - evacuate, patch, reboot, rebalance
  hosts: "{{ target_pve_hosts | default('pve1,pve2,pve3') }}"
  gather_facts: false
  serial: 1
  any_errors_fatal: true
  vars:
    pve_all_nodes:
      - pve1
      - pve2
      - pve3
    pve_other_nodes: "{{ pve_all_nodes | difference([inventory_hostname]) }}"
  tasks:
    - name: Step 1 - Evacuate all VMs from this host
      include_role:
        name: pve_evacuate_host
      when: evacuate_only | default(true) | bool
